<!-- Faculty Ask Doubt Modal -->
<div id="facultyDoubtModal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width: 500px;">
    <div class="modal-content" id="doubtModalContent" style="border-radius: 1rem; overflow: hidden; background: linear-gradient(160deg, #fffbeb 0%, #fafafa 100%); border: 1.5px solid; padding: 0;">
      
      <!-- Mustard header strip -->
      <div class="modal-header position-relative" id="doubtHeader" style="background: linear-gradient(135deg, rgba(202, 138, 4, 0.13) 0%, rgba(202, 138, 4, 0.05) 100%); border-bottom: 1px solid; padding: 1.5rem 1.5rem 1rem 1.5rem; overflow: hidden;">
        
        <!-- Decorative triangles -->
        <div class="position-absolute" id="triangleTop" style="top: -12px; right: -12px; width: 60px; height: 60px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); opacity: 0.2; background: #ca8a04;"></div>
        <div class="position-absolute" id="triangleBottom" style="bottom: 0; left: 32px; width: 35px; height: 35px; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); opacity: 0.1; background: #ca8a04;"></div>
        
        <!-- Book decoration -->
        <div class="position-absolute" style="top: -8px; right: 64px; width: 64px; height: 64px; border-radius: 50%; opacity: 0.1; background: #ca8a04;"></div>

        <div class="position-relative w-100" style="z-index: 10;">
          <div class="d-flex align-items-center gap-3">
            <div class="d-flex align-items-center justify-content-center" id="modalIconContainer" style="width: 36px; height: 36px; border-radius: 0.75rem; background: rgba(202, 138, 4, 0.13); border: 1px solid rgba(202, 138, 4, 0.27);">
              <i class="fas fa-book-open" id="modalIcon" style="color: #ca8a04; font-size: 1rem;"></i>
            </div>
            <h5 class="modal-title fw-bold" id="doubtModalTitle" style="font-family: 'Inter', sans-serif; font-size: 1.25rem; color: #78350f;">Ask a Doubt</h5>
          </div>
          <p class="mt-2 small" style="color: rgba(0,0,0,0.5); margin-bottom: 0;">Submit your question to a faculty member</p>
        </div>
        
        <button type="button" class="btn-close" style="position: absolute; top: 1rem; right: 1rem;" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Body -->
      <div class="modal-body px-4 pt-3 pb-4" id="modalBody">
        <!-- Success State -->
        <div id="successState" style="display: none;">
          <div class="d-flex flex-column align-items-center gap-3 py-4 text-center">
            <div class="d-flex align-items-center justify-content-center" id="successIconContainer" style="width: 56px; height: 56px; border-radius: 50%; background: rgba(202, 138, 4, 0.1); border: 2px solid rgba(202, 138, 4, 0.33);">
              <i class="fas fa-check-circle" id="successIcon" style="color: #ca8a04; font-size: 1.75rem;"></i>
            </div>
            <p class="fw-bold fs-5" id="successTitle" style="color: #78350f; margin-bottom: 0.25rem;">Doubt Submitted!</p>
            <p class="small" id="successMessage" style="color: rgba(0,0,0,0.5);">Your doubt has been submitted! The teacher will respond soon.</p>
          </div>
        </div>

        <!-- Form State -->
        <div id="formState">
          <form id="doubtForm" class="needs-validation" novalidate>
            <!-- Student Name -->
            <div class="mb-3">
              <label for="doubtName" class="form-label text-xs fw-semibold text-uppercase tracking-wide" style="color: rgba(0,0,0,0.55);">Student Name *</label>
              <input type="text" class="form-control" id="doubtName" placeholder="e.g. Priya Sharma" required 
                     style="background: rgba(0,0,0,0.03); border: 1px solid rgba(202, 138, 4, 0.27); border-radius: 0.75rem; font-size: 0.875rem; height: 40px; color: #0f172a;">
              <div class="invalid-feedback" id="nameError" style="color: #ef4444; font-size: 0.75rem;"></div>
            </div>

            <!-- Branch -->
            <div class="mb-3">
              <label for="doubtBranch" class="form-label text-xs fw-semibold text-uppercase tracking-wide" style="color: rgba(0,0,0,0.55);">Branch *</label>
              <input type="text" class="form-control" id="doubtBranch" placeholder="e.g. Computer Engineering" required
                     style="background: rgba(0,0,0,0.03); border: 1px solid rgba(202, 138, 4, 0.27); border-radius: 0.75rem; font-size: 0.875rem; height: 40px; color: #0f172a;">
              <div class="invalid-feedback" id="branchError" style="color: #ef4444; font-size: 0.75rem;"></div>
            </div>

            <!-- Year -->
            <div class="mb-3">
              <label class="form-label text-xs fw-semibold text-uppercase tracking-wide" style="color: rgba(0,0,0,0.55);">Year *</label>
              <select class="form-select" id="doubtYear" required
                      style="background: rgba(0,0,0,0.03); border: 1px solid rgba(202, 138, 4, 0.27); border-radius: 0.75rem; font-size: 0.875rem; height: 40px; color: #0f172a;">
                <option value="" selected disabled>Select your year</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
              </select>
              <div class="invalid-feedback" id="yearError" style="color: #ef4444; font-size: 0.75rem;"></div>
            </div>

            <!-- Select Teacher -->
            <div class="mb-3">
              <label class="form-label text-xs fw-semibold text-uppercase tracking-wide" style="color: rgba(0,0,0,0.55);">Select Teacher *</label>
              <select class="form-select" id="doubtTeacher" required
                      style="background: rgba(0,0,0,0.03); border: 1px solid rgba(202, 138, 4, 0.27); border-radius: 0.75rem; font-size: 0.875rem; height: 40px; color: #0f172a;">
                <option value="" selected disabled>Choose a teacher</option>
                <option value="Dr. A. Patil">Dr. A. Patil</option>
                <option value="Prof. S. Kulkarni">Prof. S. Kulkarni</option>
                <option value="Dr. R. Sharma">Dr. R. Sharma</option>
                <option value="Prof. M. Desai">Prof. M. Desai</option>
                <option value="Dr. P. Joshi">Dr. P. Joshi</option>
                <option value="Prof. N. Sawant">Prof. N. Sawant</option>
                <option value="Dr. K. Mehta">Dr. K. Mehta</option>
                <option value="Prof. V. Iyer">Prof. V. Iyer</option>
                <option value="Dr. L. Rao">Dr. L. Rao</option>
                <option value="Prof. H. Singh">Prof. H. Singh</option>
              </select>
              <div class="invalid-feedback" id="teacherError" style="color: #ef4444; font-size: 0.75rem;"></div>
            </div>

            <!-- Doubt / Question -->
            <div class="mb-3">
              <label for="doubtQuestion" class="form-label text-xs fw-semibold text-uppercase tracking-wide" style="color: rgba(0,0,0,0.55);">Your Doubt / Question *</label>
              <textarea class="form-control" id="doubtQuestion" rows="3" placeholder="Describe your doubt clearly (min. 10 characters)..." required
                        style="background: rgba(0,0,0,0.03); border: 1px solid rgba(202, 138, 4, 0.27); border-radius: 0.75rem; font-size: 0.875rem; resize: none; color: #0f172a;"></textarea>
              <div class="invalid-feedback" id="questionError" style="color: #ef4444; font-size: 0.75rem;"></div>
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2 pt-2">
              <button type="button" class="btn flex-fill" id="cancelBtn" data-bs-dismiss="modal" 
                      style="border-radius: 0.75rem; height: 40px; font-size: 0.875rem; color: rgba(0,0,0,0.45); background: transparent; border: 1px solid transparent;">
                Cancel
              </button>
              <button type="submit" class="btn flex-fill text-white fw-semibold" id="submitBtn"
                      style="border-radius: 0.75rem; height: 40px; font-size: 0.875rem; background: linear-gradient(135deg, #ca8a04 0%, #92400e 100%); border: none; box-shadow: 0 4px 16px rgba(202, 138, 4, 0.27);">
                <span id="submitBtnText"><i class="fas fa-book-open me-2"></i>Submit Doubt</span>
                <span id="submitBtnLoading" style="display: none;"><i class="fas fa-spinner fa-spin me-2"></i>Submitting...</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
/* Modal animations */
.modal.fade .modal-dialog {
  transform: scale(0.95);
  transition: transform 0.2s ease-out;
}

.modal.show .modal-dialog {
  transform: scale(1);
}

.modal-content {
  animation: modalSlideIn 0.3s ease-out;
}

@keyframes modalSlideIn {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Success state animation */
@keyframes checkmarkPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

#successIcon {
  animation: checkmarkPulse 0.5s ease-in-out;
}

/* Form field focus styles */
.form-control:focus, .form-select:focus {
  box-shadow: 0 0 0 0.25rem rgba(202, 138, 4, 0.25);
  border-color: #ca8a04 !important;
}

/* Invalid field styles */
.form-control.is-invalid, .form-select.is-invalid {
  border-color: #ef4444 !important;
  background-image: none;
}

.form-control.is-invalid:focus, .form-select.is-invalid:focus {
  box-shadow: 0 0 0 0.25rem rgba(239, 68, 68, 0.25);
}

/* Text utilities */
.text-xs {
  font-size: 0.75rem;
}

.tracking-wide {
  letter-spacing: 0.025em;
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  .modal-content {
    background: linear-gradient(160deg, #1a1000 0%, #111 100%) !important;
  }
  
  .modal-title, #successTitle {
    color: #fef3c7 !important;
  }
  
  .modal-header p, #successMessage {
    color: rgba(255,255,255,0.5) !important;
  }
  
  .form-label {
    color: rgba(255,255,255,0.6) !important;
  }
  
  .form-control, .form-select {
    background: rgba(255,255,255,0.05) !important;
    border-color: rgba(202, 138, 4, 0.2) !important;
    color: #f1f5f9 !important;
  }
  
  .form-control::placeholder {
    color: rgba(255,255,255,0.3);
  }
  
  .form-select option {
    background: #1e1e1e;
    color: #f1f5f9;
  }
  
  #cancelBtn {
    color: rgba(255,255,255,0.5) !important;
  }
}
</style>
